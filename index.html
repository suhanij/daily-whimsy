<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ The Whimsy Deck ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Caveat', cursive;
  overflow-x: hidden;
  background: #9a6830;
  cursor: default;
}

/* ========== DESK ========== */
.desk {
  min-height: 100vh;
  position: relative;
  background:
    repeating-linear-gradient(87deg, transparent 0px, transparent 34px, rgba(60,25,5,0.07) 34px, rgba(60,25,5,0.07) 36px),
    repeating-linear-gradient(93deg, transparent 0px, transparent 60px, rgba(60,25,5,0.04) 60px, rgba(60,25,5,0.04) 61px),
    radial-gradient(ellipse at 30% 70%, #c8945a 0%, #b07840 40%, #9a6830 100%);
  padding: 20px 14px 100px;
}

.content {
  position: relative;
  z-index: 5;
  max-width: 980px;
  margin: 0 auto;
}

/* ========== CSS PAPER TEXTURES (15 types) ========== */

.tex-pink-gingham {
  background-color: #f8d5e2;
  background-image:
    repeating-linear-gradient(0deg,   rgba(210,80,130,0.22) 0px, rgba(210,80,130,0.22) 11px, transparent 11px, transparent 22px),
    repeating-linear-gradient(90deg,  rgba(210,80,130,0.22) 0px, rgba(210,80,130,0.22) 11px, transparent 11px, transparent 22px),
    repeating-linear-gradient(0deg,   rgba(240,160,185,0.18) 5px, rgba(240,160,185,0.18) 6px, transparent 6px, transparent 22px),
    repeating-linear-gradient(90deg,  rgba(240,160,185,0.18) 5px, rgba(240,160,185,0.18) 6px, transparent 6px, transparent 22px);
}

/* 9. Teal Plaid */
.tex-teal-plaid {

  background-image:

    radial-gradient(ellipse at 70% 70%, rgba(220,120,155,0.18) 0%, transparent 60%),

}

.tex-ocean {
  background-color: #b8d8ea;
  background-image:
    radial-gradient(ellipse at 20% 35%, rgba(20,90,140,0.22) 0%, transparent 60%),

}
/* 12. Newsprint */
.tex-newsprint {
  background-color: #e8dfc8;
  background-image:
    repeating-linear-gradient(0deg, rgba(60,45,20,0.1) 0px, rgba(60,45,20,0.1) 1px, transparent 1px, transparent 10px),
    repeating-linear-gradient(90deg, rgba(60,45,20,0.04) 0px, rgba(60,45,20,0.04) 40px, transparent 40px, transparent 80px),
    radial-gradient(ellipse at 60% 40%, rgba(120,90,40,0.08) 0%, transparent 70%);
}

.tex-yellow-gingham {
  background-color: #f8f0b8;
  background-image:
    repeating-linear-gradient(0deg,   rgba(185,145,10,0.3) 0px, rgba(185,145,10,0.3) 10px, transparent 10px, transparent 20px),
    repeating-linear-gradient(90deg,  rgba(185,145,10,0.3) 0px, rgba(185,145,10,0.3) 10px, transparent 10px, transparent 20px),
    repeating-linear-gradient(0deg,   rgba(220,190,60,0.15) 5px, rgba(220,190,60,0.15) 6px, transparent 6px, transparent 20px),

/* 14. Red Gingham */
.tex-red-gingham {
  background-color: #f8d0c8;
  background-image:
    repeating-linear-gradient(0deg,   rgba(170,30,30,0.28) 0px, rgba(170,30,30,0.28) 11px, transparent 11px, transparent 22px),

    repeating-linear-gradient(90deg,  rgba(210,80,80,0.12) 5px, rgba(210,80,80,0.12) 6px, transparent 6px, transparent 22px);

/* 15. Purple Plaid */
.tex-purple-plaid {
  background-color: #d0bce8;
  background-image:
    repeating-linear-gradient(0deg,   rgba(65,25,115,0.3) 0px, rgba(65,25,115,0.3) 6px, transparent 6px, transparent 28px),
    repeating-linear-gradient(90deg,  rgba(65,25,115,0.3) 0px, rgba(65,25,115,0.3) 6px, transparent 6px, transparent 28px),
    repeating-linear-gradient(0deg,   rgba(65,25,115,0.14) 12px, rgba(65,25,115,0.14) 15px, transparent 15px, transparent 28px),
    repeating-linear-gradient(90deg,  rgba(65,25,115,0.14) 12px, rgba(65,25,115,0.14) 15px, transparent 15px, transparent 28px);

/* ========== BG LAYER ========== */
.bg-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
}

/* ========== HEADER ========== */
.header {
  text-align: center;
  margin-bottom: 28px;
  padding-top: 18px;
  position: relative;
  z-index: 10;
}

.header-paper {
  display: inline-block;
  position: relative;
  transform: rotate(-1.3deg);
  /* ruled lines */
  background-color: #f5ead0;
  background-image:
    repeating-linear-gradient(0deg, transparent 0px, transparent 27px, rgba(60,30,10,0.09) 27px, rgba(60,30,10,0.09) 28px),
    linear-gradient(160deg, #f8f0d8 0%, #ead8b0 100%);
  padding: 24px 50px 30px;
  box-shadow: 6px 8px 0 rgba(0,0,0,0.2), 2px 3px 0 rgba(0,0,0,0.08);
  border: 1px solid rgba(140,90,30,0.18);
  /* torn bottom edge via clip-path */
  clip-path: polygon(
    0% 0%, 100% 0%, 100% 94%,
    97% 98%, 94% 93%, 91% 99%, 88% 94%, 85% 100%,
    82% 95%, 79% 100%, 76% 94%, 73% 99%, 70% 95%,
    67% 100%, 64% 95%, 61% 99%, 58% 94%, 55% 100%,
    52% 95%, 49% 99%, 46% 94%, 43% 100%, 40% 95%,
    37% 99%, 34% 94%, 31% 100%, 28% 95%, 25% 99%,
    22% 94%, 19% 99%, 16% 94%, 13% 99%, 10% 95%,
    7% 100%, 4% 95%, 1% 99%, 0% 94%
  );
}

/* Tape pieces on header */
.header-paper .tape-h1, .header-paper .tape-h2, .header-paper .tape-h3 {
  position: absolute;
  height: 20px;
  border-radius: 1px;
}
.header-paper .tape-h1 {
  width: 62px; top: -9px; left: 22px;
  transform: rotate(-4deg);
  background: rgba(255,215,110,0.58);
  border: 1px solid rgba(200,155,50,0.4);
}
.header-paper .tape-h2 {
  width: 50px; top: -9px; right: 18px;
  transform: rotate(5deg);
  background: rgba(190,225,215,0.62);
  border: 1px solid rgba(90,165,145,0.4);
}
.header-paper .tape-h3 {
  width: 44px; bottom: -9px; left: 50%; transform: translateX(-50%) rotate(-2deg);
  background: rgba(220,190,240,0.6);
  border: 1px solid rgba(140,90,190,0.35);
}

.site-title {
  font-family: 'Kalam', cursive;
  font-weight: 700;
  font-size: clamp(28px, 5.5vw, 54px);
  color: #5a2a50;
  line-height: 1.1;
  text-shadow: 2px 2px 0 rgba(90,42,80,0.15);
}
.site-subtitle {
  font-family: 'Caveat', cursive;
  font-size: 19px;
  color: #8a3a1a;
  margin-top: 5px;
  display: block;
  transform: rotate(0.6deg);
}
.header-deco {
  font-size: 16px;
  color: #9b84b8;
  letter-spacing: 10px;
  margin: 6px 0;
  display: block;
}

/* ========== DAILY CARD BANNER ========== */
.daily-card-section {
  text-align: center;
  margin-bottom: 30px;
  position: relative;
  z-index: 10;
}
.daily-card-paper {
  display: inline-block;
  position: relative;
  background-color: #1a1035;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.3) 1.5px, transparent 1.5px),
    radial-gradient(circle at 70% 30%, rgba(255,220,80,0.5) 0%, rgba(255,220,80,0.5) 2px, transparent 2px),
    radial-gradient(circle at 88% 15%, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0.28) 1.5px, transparent 1.5px),
    radial-gradient(circle at 25% 65%, rgba(200,180,255,0.3) 0%, rgba(200,180,255,0.3) 1.5px, transparent 1.5px),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.22) 1px, transparent 1px);
  padding: 22px 38px 28px;
  transform: rotate(0.8deg);
  box-shadow: 6px 8px 0 rgba(0,0,0,0.3), 2px 3px 0 rgba(0,0,0,0.12);
  border: 2px solid #c9a84c;
  max-width: 520px;
  clip-path: polygon(
    0% 0%, 100% 0%, 100% 93%,
    97% 98%, 94% 93%, 91% 99%, 88% 93%, 85% 99%,
    82% 93%, 79% 99%, 76% 93%, 73% 98%, 70% 93%,
    67% 99%, 64% 93%, 61% 98%, 58% 93%, 55% 99%,
    52% 93%, 49% 98%, 46% 93%, 43% 99%, 40% 93%,
    37% 98%, 34% 93%, 31% 99%, 28% 93%, 25% 98%,
    22% 93%, 19% 99%, 16% 93%, 13% 98%, 10% 93%,
    7% 99%, 4% 93%, 1% 98%, 0% 93%
  );
}
.daily-card-paper .tape-d {
  position: absolute;
  top: -10px; left: 50%;
  transform: translateX(-50%) rotate(-2deg);
  width: 60px; height: 20px;
  background: rgba(255,215,110,0.55);
  border: 1px solid rgba(200,155,50,0.35);
  border-radius: 1px;
}
.daily-label {
  font-family: 'Kalam', cursive;
  font-size: 11px;
  color: #c9a84c;
  letter-spacing: 4px;
  opacity: 0.7;
  margin-bottom: 6px;
  display: block;
}
.daily-title {
  font-family: 'Kalam', cursive;
  font-weight: 700;
  font-size: 26px;
  color: #f5e8a8;
  line-height: 1.2;
  margin-bottom: 10px;
  text-shadow: 0 0 20px rgba(201,168,76,0.4);
}
.daily-affirmation {
  font-family: 'Caveat', cursive;
  font-size: 17px;
  color: #e0d8f8;
  line-height: 1.65;
}
.daily-date {
  font-family: 'Caveat', cursive;
  font-size: 12px;
  color: #c9a84c;
  opacity: 0.55;
  margin-top: 10px;
  display: block;
}

/* ========== SHUFFLE AREA ========== */
.shuffle-area {
  text-align: center;
  margin: 10px 0 36px;
  position: relative;
  z-index: 10;
}

.prompt-note {
  display: inline-block;
  position: relative;
  transform: rotate(1.4deg);
  background-color: #f8f0d8;
  background-image: repeating-linear-gradient(0deg, transparent 0px, transparent 21px, rgba(60,30,10,0.08) 21px, rgba(60,30,10,0.08) 22px);
  padding: 12px 30px;
  font-size: 17px;
  color: #5a3020;
  box-shadow: 3px 4px 0 rgba(0,0,0,0.15);
  border: 1px solid rgba(120,70,20,0.12);
  clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 97% 90%, 94% 83%, 91% 90%, 88% 85%, 85% 92%, 82% 85%, 79% 91%, 76% 84%, 73% 90%, 70% 85%, 67% 91%, 64% 85%, 61% 90%, 58% 83%, 55% 90%, 52% 85%, 49% 92%, 46% 84%, 43% 90%, 40% 85%, 37% 91%, 34% 85%, 31% 90%, 28% 83%, 25% 90%, 22% 85%, 19% 90%, 16% 83%, 13% 90%, 10% 85%, 7% 91%, 4% 85%, 1% 91%, 0% 85%);
  margin-bottom: 20px;
}
/* tape on prompt note */
.prompt-note::before {
  content: '';
  position: absolute;
  top: -10px; left: 50%; transform: translateX(-50%) rotate(-1.5deg);
  width: 42px; height: 19px;
  background: rgba(255,215,110,0.55);
  border: 1px solid rgba(200,155,50,0.35);
  border-radius: 1px;
}

.shuffle-btn {
  display: inline-block;
  position: relative;
  background-color: #f5e8c8;
  background-image: repeating-linear-gradient(0deg, transparent 0px, transparent 23px, rgba(60,30,10,0.06) 23px, rgba(60,30,10,0.06) 24px);
  font-family: 'Kalam', cursive;
  font-weight: 700;
  font-size: 22px;
  color: #4a2848;
  padding: 18px 50px 20px;
  cursor: pointer;
  border: none;
  transform: rotate(-0.7deg);
  transition: transform 0.25s, box-shadow 0.25s;
  box-shadow: 5px 7px 0 rgba(0,0,0,0.22), 2px 3px 0 rgba(0,0,0,0.1);
  outline: none;
  /* rough edge */
  clip-path: polygon(
    1% 2%, 99% 0%, 100% 96%, 97% 100%, 94% 97%, 91% 100%, 88% 97%,
    85% 100%, 82% 97%, 79% 100%, 76% 97%, 73% 100%, 70% 97%,
    67% 100%, 64% 97%, 61% 100%, 58% 97%, 55% 100%, 52% 97%,
    49% 100%, 46% 97%, 43% 100%, 40% 97%, 37% 100%, 34% 97%,
    31% 100%, 28% 97%, 25% 100%, 22% 97%, 19% 100%, 16% 97%,
    13% 100%, 10% 97%, 7% 100%, 4% 97%, 1% 100%
  );
}
/* inner dashed border */
.shuffle-btn::after {
  content: '';
  position: absolute;
  inset: 8px;
  border: 2px dashed rgba(90,42,80,0.32);
  pointer-events: none;
}
.shuffle-btn::before {
  content: 'pull from the deck';
  display: block;
  font-size: 12px;
  color: #8a4a2a;
  font-family: 'Caveat', cursive;
  margin-bottom: 1px;
  letter-spacing: 1px;
  opacity: 0.65;
}
.shuffle-btn:hover { transform: rotate(0.7deg) translateY(-4px); box-shadow: 7px 11px 0 rgba(0,0,0,0.22); }
.shuffle-btn:active { transform: rotate(-0.2deg) translateY(2px); box-shadow: 3px 4px 0 rgba(0,0,0,0.22); }

@keyframes messy-shuffle {
  0%   { transform: rotate(-0.7deg) translateX(0); }
  15%  { transform: rotate(-12deg) translateX(-25px) scale(0.97); }
  35%  { transform: rotate(9deg)  translateX(22px) scale(1.02); }
  55%  { transform: rotate(-7deg) translateX(-14px); }
  75%  { transform: rotate(6deg)  translateX(14px); }
  100% { transform: rotate(-0.7deg) translateX(0); }
}
.shuffling { animation: messy-shuffle 0.7s ease; }

/* ========== BIG CARD REVEAL ========== */
.reveal-area {
  display: none;
  text-align: center;
  margin: 6px auto 46px;
  position: relative;
  z-index: 10;
}
.reveal-area.visible { display: block; }

.big-card-wrap {
  width: 275px;
  height: 430px;
  margin: 0 auto;
  perspective: 1400px;
  cursor: pointer;
}
.big-card-inner {
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.95s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.big-card-wrap.flipped .big-card-inner {
  transform: rotateY(180deg);
}
.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 6px;
  clip-path: inset(0 round 6px);
}

/* Big card back */
.big-back {
  background: #1a1035;
  border: 3px solid #c9a84c;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 14px 45px rgba(0,0,0,0.6);
}
/* Big card front */
.big-front {
  transform: rotateY(180deg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 22px 16px 18px;
  box-shadow: 0 14px 45px rgba(0,0,0,0.45);
  position: relative;
}
/* washi tape on big front */
.big-front .card-washi {
  position: absolute;
  top: -10px; left: 50%;
  transform: translateX(-50%) rotate(-2deg);
  width: 58px; height: 20px;
  border-radius: 1px;
  z-index: 10;
}
/* torn bottom on big front */
.big-front::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 10px;
  background: rgba(0,0,0,0.06);
  clip-path: polygon(0 0,3% 100%,6% 20%,9% 100%,12% 10%,15% 100%,18% 20%,21% 100%,24% 10%,27% 100%,30% 20%,33% 100%,36% 10%,39% 100%,42% 20%,45% 100%,48% 10%,51% 100%,54% 20%,57% 100%,60% 10%,63% 100%,66% 20%,69% 100%,72% 10%,75% 100%,78% 20%,81% 100%,84% 10%,87% 100%,90% 20%,93% 100%,96% 10%,100% 0);
  pointer-events: none;
}

.big-illo { width: 135px; height: 135px; flex-shrink: 0; margin-top: 6px; }
.big-title {
  font-family: 'Kalam', cursive;
  font-weight: 700;
  font-size: 19px;
  margin: 8px 0 4px;
  text-align: center;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.1);
}
.big-affirmation {
  font-family: 'Caveat', cursive;
  font-size: 16px;
  line-height: 1.6;
  text-align: center;
  flex: 1;
  display: flex;
  align-items: center;
  padding: 0 5px;
}
.big-num {
  font-family: 'Kalam', cursive;
  font-size: 10px;
  opacity: 0.5;
  letter-spacing: 3px;
  margin-top: 6px;
}

/* hint text under big card */
.flip-hint {
  font-family: 'Caveat', cursive;
  font-size: 14px;
  color: rgba(255,255,255,0.55);
  margin-top: 10px;
  transform: rotate(-0.5deg);
  display: block;
}

/* ========== DECK LABEL ========== */
.deck-label-wrap {
  text-align: center;
  margin-bottom: 20px;
  position: relative;
  z-index: 10;
}
.deck-label {
  display: inline-block;
  position: relative;
  background-color: #f5e8c8;
  background-image: repeating-linear-gradient(0deg, transparent 0px, transparent 26px, rgba(60,30,10,0.07) 26px, rgba(60,30,10,0.07) 27px);
  font-family: 'Kalam', cursive;
  font-weight: 700;
  font-size: 24px;
  color: #4a2848;
  padding: 8px 32px 11px;
  transform: rotate(-0.9deg);
  box-shadow: 4px 6px 0 rgba(0,0,0,0.18);
  clip-path: polygon(0% 2%, 100% 0%, 99% 90%, 97% 96%, 94% 90%, 91% 97%, 88% 90%, 85% 97%, 82% 90%, 79% 96%, 76% 90%, 73% 97%, 70% 90%, 67% 97%, 64% 90%, 61% 97%, 58% 90%, 55% 96%, 52% 90%, 49% 97%, 46% 90%, 43% 97%, 40% 90%, 37% 97%, 34% 90%, 31% 97%, 28% 90%, 25% 97%, 22% 90%, 19% 97%, 16% 90%, 13% 97%, 10% 90%, 7% 97%, 4% 90%, 1% 97%, 0% 90%);
}
.deck-label .tape-dl1, .deck-label .tape-dl2 {
  position: absolute;
  height: 18px;
  border-radius: 1px;
  top: -9px;
}
.deck-label .tape-dl1 { width: 48px; left: 12px; transform: rotate(-5deg); background: rgba(200,230,215,0.62); border: 1px solid rgba(90,165,145,0.4); }
.deck-label .tape-dl2 { width: 44px; right: 10px; transform: rotate(4deg); background: rgba(255,200,200,0.6); border: 1px solid rgba(190,80,100,0.38); }

/* ========== CARDS GRID ========== */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 24px;
  padding: 10px 4px 20px;
  position: relative;
  z-index: 10;
}

/* ===== MINI CARD - FLIPPABLE ===== */
.mini-card {
  aspect-ratio: 2/3.1;
  position: relative;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.mini-card:hover {
  box-shadow: 8px 14px 0 rgba(0,0,0,0.28);
}

/* Scale-swap flip: shrink to 0, swap face, grow back */
.mini-card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.2s ease-in;
  transform: scaleX(1);
  border-radius: 5px;
  overflow: hidden;
}
.mini-card-inner.flipping-out {
  transform: scaleX(0);
}
.mini-card-inner.flipping-in {
  transition: transform 0.2s ease-out;
  transform: scaleX(1);
}

.mini-face {
  position: absolute;
  inset: 0;
  border-radius: 5px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 7px 6px 10px;
  box-shadow: 4px 6px 0 rgba(0,0,0,0.24), 1px 2px 0 rgba(0,0,0,0.1);
}
.mini-face.hidden {
  display: none;
}

/* MINI CARD BACK (dark, visible by default) */
.mini-back {
  /* dark scrapbook back */
  background: #1a1035;
  border: 2px solid #c9a84c;
}
.mini-back-pattern {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.mini-back-deco {
  font-size: 18px;
  opacity: 0.6;
}
.mini-back-num {
  font-family: 'Kalam', cursive;
  font-size: 9px;
  color: #c9a84c;
  letter-spacing: 2px;
  opacity: 0.7;
}

/* MINI CARD FRONT (texture, hidden until flip) */
.mini-front {
  position: relative;
}
/* washi tape on mini front */
.mini-front .m-washi {
  position: absolute;
  top: -9px;
  left: 50%;
  height: 17px;
  border-radius: 1px;
  z-index: 5;
}
/* torn edge on mini front bottom */
.mini-front::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 7px;
  background: rgba(0,0,0,0.08);
  clip-path: polygon(0 0,5% 100%,10% 0,15% 100%,20% 0,25% 100%,30% 0,35% 100%,40% 0,45% 100%,50% 0,55% 100%,60% 0,65% 100%,70% 0,75% 100%,80% 0,85% 100%,90% 0,95% 100%,100% 0);
  pointer-events: none;
}
/* scrapbook sticker element on some cards - top-left corner */
.mini-front .corner-sticker {
  position: absolute;
  top: 4px;
  left: 4px;
  width: 18px;
  height: 18px;
  font-size: 14px;
  line-height: 1;
  z-index: 4;
  filter: drop-shadow(0 1px 1px rgba(0,0,0,0.15));
}

.m-illo { width: 60px; height: 60px; flex-shrink: 0; margin-top: 14px; }
.m-title {
  font-family: 'Kalam', cursive;
  font-weight: 700;
  font-size: 9px;
  text-align: center;
  line-height: 1.3;
  text-shadow: 0 1px 0 rgba(255,255,255,0.3);
}
.m-snippet {
  font-family: 'Caveat', cursive;
  font-size: 8.5px;
  text-align: center;
  line-height: 1.4;
  opacity: 0.88;
  padding: 0 3px 2px;
  overflow: hidden;
}

/* hover lift */
.mini-card:hover {
  transform: translateY(-8px) scale(1.05) !important;
}

/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(130px);
  background-color: #f5e8c8;
  background-image: repeating-linear-gradient(0deg, transparent 0px, transparent 22px, rgba(60,30,10,0.07) 22px, rgba(60,30,10,0.07) 23px);
  color: #4a2848;
  font-family: 'Kalam', cursive;
  font-size: 16px;
  padding: 12px 28px;
  box-shadow: 4px 6px 0 rgba(0,0,0,0.2);
  transition: transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 200;
  border: 2px dashed rgba(140,60,80,0.42);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0) rotate(-1.2deg); }
</style>

        <path d="M12,8 L14,16 M8,12 L18,12" stroke="#9b84b8" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M48,44 L50,52 M44,48 L54,48" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div class="mini-back-num">✦ ${String(card.id).padStart(2,'0')} ✦</div>
    </div>
  `;

  // — FRONT face (hidden by default) —
  const front = document.createElement('div');
  front.className = `mini-face mini-front ${tex.cls} hidden`;
  front.style.color = tex.color;

  // washi tape
  const wasWidth = 44 + Math.floor(i * 3 % 18);
  const wasRot = ((i * 11 + 2) % 14) - 7;
  front.innerHTML = `
    <div class="m-washi" style="width:${wasWidth}px;transform:translateX(-50%) rotate(${wasRot}deg);background:${tex.washiBg};border:1px solid ${tex.washiBd};"></div>
    <div class="corner-sticker">${tex.cornerSticker}</div>
    <div class="m-illo">${illoSvg}</div>
    <div class="m-title" style="color:${tex.accent}">${card.title}</div>
    <div class="m-snippet">${card.affirmation}</div>
  `;

  inner.appendChild(back);
  inner.appendChild(front);
  outer.appendChild(inner);

  let isFlipped = false;
  outer.addEventListener('click', () => {
    if (inner.classList.contains('flipping-out')) return; // mid-animation guard

    inner.classList.add('flipping-out');

    setTimeout(() => {
      isFlipped = !isFlipped;
      if (isFlipped) {
        back.classList.add('hidden');
        front.classList.remove('hidden');
        showToast(`✦ ${card.title} ✦`);
      } else {
        front.classList.add('hidden');
        back.classList.remove('hidden');
      }
      inner.classList.remove('flipping-out');
      inner.classList.add('flipping-in');
      setTimeout(() => inner.classList.remove('flipping-in'), 220);
    }, 200);
  });

  grid.appendChild(outer);
});

// =============================================
// BIG CARD LOGIC
// =============================================
let bigCardIsFlipped = false;
let currentCardIdx = -1;

// Fisher-Yates shuffle for true randomness
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Seeded extra entropy from timestamp + mouse movement
let mouseEntropy = 0;
document.addEventListener('mousemove', e => { mouseEntropy = (mouseEntropy + e.clientX * e.clientY) % 999983; });

function trueRandom(max) {
  const seed = (Date.now() ^ mouseEntropy ^ Math.floor(Math.random() * 1e9));
  // xorshift32
  let s = seed >>> 0 || 1;
  s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
  return (s >>> 0) % max;
}

let shuffleRunning = false;

function drawCard() {
  if (shuffleRunning) return;
  shuffleRunning = true;

  const btn = document.getElementById('shuffleBtn');
  btn.disabled = true;
  btn.classList.add('shuffling');
  setTimeout(() => btn.classList.remove('shuffling'), 700);

  // Show the preview area
  const area = document.getElementById('revealArea');
  const wrap = document.getElementById('bigCardWrap');
  const front = document.getElementById('bigFront');

  // Reset big card to back
  wrap.classList.remove('flipped');
  area.classList.add('visible');
  setTimeout(() => area.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);

  // Build shuffled deck order for the animation
  const shuffledIndices = shuffleArray(cards.map((_, i) => i));
  const finalIndex = shuffledIndices[trueRandom(shuffledIndices.length)];
  const finalCard = cards[finalIndex];

  // Flash through random cards rapidly on the big card face
  let flashCount = 0;
  const totalFlashes = 18 + trueRandom(8); // 18-25 flashes
  const flashOrder = shuffleArray([...shuffledIndices, ...shuffledIndices]).slice(0, totalFlashes);

  function flashNext() {
    if (flashCount >= totalFlashes) {
      // Land on final card
      setTimeout(() => {
        revealCard(finalCard, finalIndex);
        btn.disabled = false;
        shuffleRunning = false;
      }, 180);
      return;
    }

    const idx = flashOrder[flashCount];
    const c = cards[idx];
    const tex = textures[idx % textures.length];
    const illoSvg = illos[c.illoKey]();

    front.className = `card-face big-front ${tex.cls}`;
    front.style.color = tex.color;
    front.innerHTML = `
      <div class="card-washi" style="background:${tex.washiBg};border:1px solid ${tex.washiBd};"></div>
      <div style="font-family:'Kalam',cursive;font-size:10px;letter-spacing:2px;color:${tex.accent};opacity:0.65;margin-top:14px">✦ card ${String(c.id).padStart(2,'0')} ✦</div>
      <div class="big-illo">${illoSvg}</div>
      <div class="big-title" style="color:${tex.accent}">${c.title}</div>
      <div class="big-affirmation" style="font-size:13px;opacity:0.7">"${c.affirmation}"</div>
      <div class="big-num" style="color:${tex.accent}">✦ · ✦ · ✦</div>
    `;

    // Show front during flash
    wrap.classList.add('flipped');

    flashCount++;
    // Ease: fast at start, slow down at end
    const progress = flashCount / totalFlashes;
    const delay = 60 + Math.floor(progress * progress * 340);
    setTimeout(flashNext, delay);
  }

  // Start flashing after brief pause
  setTimeout(flashNext, 400);
}

function revealCard(card, i) {
  currentCardIdx = i;
  bigCardIsFlipped = false;

  const wrap = document.getElementById('bigCardWrap');
  const front = document.getElementById('bigFront');
  const tex = textures[i % textures.length];
  const wc = washibackColors[i % washibackColors.length];
  const illoSvg = illos[card.illoKey]();

  // Reset to back
  wrap.classList.remove('flipped');

  // Fill front
  front.className = `card-face big-front ${tex.cls}`;
  front.style.color = tex.color;
  front.innerHTML = `
    <div class="card-washi" style="background:${tex.washiBg};border:1px solid ${tex.washiBd};"></div>
    <div style="font-family:'Kalam',cursive;font-size:10px;letter-spacing:2px;color:${tex.accent};opacity:0.65;margin-top:14px">✦ card ${String(card.id).padStart(2,'0')} ✦</div>
    <div class="big-illo">${illoSvg}</div>
    <div class="big-title" style="color:${tex.accent}">${card.title}</div>
    <div class="big-affirmation">"${card.affirmation}"</div>
    <div class="big-num" style="color:${tex.accent}">✦ · ✦ · ✦</div>
  `;

  const area = document.getElementById('revealArea');
  area.classList.add('visible');

  // Flip to front after short pause
  setTimeout(() => {
    wrap.classList.add('flipped');
    bigCardIsFlipped = true;
  }, 350);

  setTimeout(() => area.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
  showToast(`✦ ${card.title} has chosen you ✦`);
}

function toggleBigFlip() {
  const wrap = document.getElementById('bigCardWrap');
  if (wrap.classList.contains('flipped')) {
    wrap.classList.remove('flipped');
    bigCardIsFlipped = false;
  } else {
    wrap.classList.add('flipped');
    bigCardIsFlipped = true;
  }
}

// =============================================
async function loadDailyCard() {
  try {
    const res = await fetch('daily_card.json?nocache=' + Date.now());
    const data = await res.json();
    document.getElementById('dailyTitle').textContent = data.title;
    document.getElementById('dailyAffirmation').textContent = '"' + data.affirmation + '"';
    document.getElementById('dailyDate').textContent = data.date;
  } catch (e) {
    document.getElementById('dailyTitle').textContent = 'The Wandering Star';
    document.getElementById('dailyAffirmation').textContent = '"You showed up today, and that alone is a small act of magic worth celebrating."';
    document.getElementById('dailyDate').textContent = 'today';
  }
}
loadDailyCard();

  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3800);
}
